<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Birthday Surprise for My Love</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f8a5c2;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            touch-action: manipulation;
        }

        /* Background Hearts */
        .heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.5);
            font-size: 20px;
            pointer-events: none;
            z-index: 1;
        }

        /* Container Utama */
        .main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 5;
            padding: 20px;
        }

        /* Struktur Kue */
        .cake-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        .cake-layer {
            background: #fff;
            border-radius: 10px;
            border-bottom: 4px solid #f1f1f1;
            position: relative;
            transform: translateY(-100vh); /* Mulai dari luar layar atas */
        }

        .layer-bottom { width: 180px; height: 45px; z-index: 6; }
        .layer-middle { width: 150px; height: 40px; z-index: 7; margin-bottom: -5px; }
        .layer-top    { width: 120px; height: 35px; z-index: 8; margin-bottom: -5px; }

        .filling {
            width: 100%;
            height: 8px;
            background: #6d4c41;
            position: absolute;
            bottom: 12px;
        }

        .plate {
            width: 220px;
            height: 12px;
            background: #6d4c41;
            border-radius: 50px;
            z-index: 5;
        }

        .candle {
            width: 8px;
            height: 30px;
            background: #fff;
            border-radius: 2px;
            position: relative;
            z-index: 10;
            transform: translateY(-100vh);
        }

        .flame {
            width: 10px;
            height: 16px;
            background: #ffeb3b;
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            top: -18px;
            left: -1px;
            box-shadow: 0 0 10px #fff700;
            opacity: 0;
        }

        /* Teks & Tombol */
        .text-group {
            text-align: center;
            opacity: 0;
            margin-top: 15px;
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 2.2rem; color: #b33951; }
        p { color: #b33951; font-weight: 300; margin-bottom: 15px; }

        .letter-btn {
            background: #fff;
            color: #d81b60;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            font-size: 14px;
        }

        /* Popup & Overlay */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; z-index: 100;
        }

        #letter-popup {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 85%;
            max-width: 320px;
            background: #fff;
            padding: 25px;
            border-radius: 20px;
            z-index: 200; /* Di atas overlay */
            text-align: center;
            display: none;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        #letter-popup h2 { font-family: 'Dancing Script', cursive; color: #d81b60; margin-bottom: 10px; }
        #letter-popup p { font-size: 0.9rem; line-height: 1.6; color: #333; margin-bottom: 15px; }

        .close-btn {
            background: #f8a5c2;
            color: white;
            border: none;
            padding: 10px 0;
            width: 100%;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Responsif HP Sangat Kecil */
        @media (max-width: 350px) {
            .layer-bottom { width: 150px; }
            .plate { width: 180px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div id="overlay"></div>

    <div class="main-wrapper" id="content-to-blur">
        <div class="cake-container">
            <div class="candle" id="candle"><div class="flame" id="flame"></div></div>
            <div class="cake-layer layer-top" id="l3"><div class="filling"></div></div>
            <div class="cake-layer layer-middle" id="l2"><div class="filling"></div></div>
            <div class="cake-layer layer-bottom" id="l1"><div class="filling"></div></div>
            <div class="plate" id="plate"></div>
        </div>

        <div class="text-group" id="text-group">
            <h1>Happy Birthday!</h1>
            <p>My Love ❤️</p>
            <button class="letter-btn" id="openBtn">📩 Buka Surat Dari Aku</button>
        </div>
    </div>

    <div id="letter-popup">
        <h2>Dear, My Love</h2>
        <p>Selamat ulang tahun sayang! 🎂<br>Terima kasih sudah hadir dan melengkapi hari-hariku. Semoga kamu selalu bahagia, sehat, dan sukses. I love you so much! ❤️</p>
        <button class="close-btn" id="closeBtn">Tutup</button>
    </div>

    <script>
        const tl = gsap.timeline();

        // 1. Animasi Kue Jatuh (Bounce)
        tl.from("#plate", { scale: 0, opacity: 0, duration: 0.6, ease: "back.out(1.7)" });
        tl.to("#l1", { y: 0, duration: 0.6, ease: "bounce.out" }, "-=0.2")
          .to("#l2", { y: 0, duration: 0.6, ease: "bounce.out" }, "-=0.4")
          .to("#l3", { y: 0, duration: 0.6, ease: "bounce.out" }, "-=0.4")
          .to("#candle", { y: 0, duration: 0.5, ease: "back.out(2)" });

        // 2. Nyalakan Api & Confetti
        tl.to("#flame", { 
            opacity: 1, scale: 1.2, duration: 0.3, 
            onComplete: () => {
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            }
        });

        // 3. Teks Muncul
        tl.to("#text-group", { opacity: 1, y: -10, duration: 0.8, ease: "power2.out" });

        // Loop Animasi Api & Tombol
        gsap.to("#flame", { scaleX: 0.8, scaleY: 1.2, repeat: -1, yoyo: true, duration: 0.15 });
        gsap.to(".letter-btn", { scale: 1.05, repeat: -1, yoyo: true, duration: 0.8, ease: "sine.inOut" });

        // 4. Floating Hearts
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '100vh';
            document.body.appendChild(heart);
            gsap.to(heart, {
                y: -window.innerHeight - 50,
                x: (Math.random() - 0.5) * 100,
                duration: 4,
                opacity: 0,
                onComplete: () => heart.remove()
            });
        }
        setInterval(createHeart, 600);

        // 5. Logika Tombol Surat
        const openBtn = document.getElementById('openBtn');
        const closeBtn = document.getElementById('closeBtn');
        const popup = document.getElementById('letter-popup');
        const overlay = document.getElementById('overlay');
        const content = document.getElementById('content-to-blur');

        openBtn.onclick = () => {
            overlay.style.display = 'block';
            popup.style.display = 'block';
            gsap.to(popup, { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.7)" });
            gsap.to(content, { filter: "blur(5px)", scale: 0.9, duration: 0.4 });
        };

        const closeAll = () => {
            gsap.to(popup, { opacity: 0, scale: 0, duration: 0.3, onComplete: () => {
                popup.style.display = 'none';
                overlay.style.display = 'none';
            }});
            gsap.to(content, { filter: "blur(0px)", scale: 1, duration: 0.4 });
        };

        closeBtn.onclick = closeAll;
        overlay.onclick = closeAll;
    </script>
</body>
</html>
